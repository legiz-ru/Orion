<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon-180x180.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png" />
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3b82f6" id="themeColor">
    <meta name="description" content="<%= metaDescription %>" id="metaDesc">
    <title id="pageTitle"><%= metaTitle %></title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module" defer>
    import { polyfillCountryFlagEmojis } from "https://cdn.skypack.dev/country-flag-emoji-polyfill";
    polyfillCountryFlagEmojis();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
:root {
    --primary-color: #3b82f6;
    --primary-hover: #2563eb;
    --background: #ffffff;
    --surface: #f8fafc;
    --border: #e2e8f0;
    --text-primary: #1e293b;
    --text-secondary: #64748b;
    --text-muted: #94a3b8;
    --success: #10b981;
    --warning: #f59e0b;
    --error: #ef4444;
    --info: #3b82f6;
    --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
    --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
    --radius: 0.5rem;
    --color-blue: #3b82f6;
    --color-cyan: #06b6d4;
    --color-dark: #1e293b;
    --color-grape: #8b5cf6;
    --color-gray: #6b7280;
    --color-green: #10b981;
    --color-indigo: #6366f1;
    --color-lime: #84cc16;
    --color-orange: #f97316;
    --color-pink: #ec4899;
    --color-red: #ef4444;
    --color-teal: #14b8a6;
    --color-violet: #8b5cf6;
    --color-yellow: #eab308;
}

.dark-theme {
    --background: #0f172a;
    --surface: #1e293b;
    --border: #334155;
    --text-primary: #f1f5f9;
    --text-secondary: #cbd5e1;
    --text-muted: #94a3b8;
    --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.3), 0 1px 2px -1px rgb(0 0 0 / 0.3);
    --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.3), 0 4px 6px -4px rgb(0 0 0 / 0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
    background-color: var(--background);
    color: var(--text-primary);
    line-height: 1.6;
    transition: background-color 0.3s ease, color 0.3s ease;
}

.container { max-width: 1200px; margin: 0 auto; padding: 20px; }

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    flex-wrap: wrap;
    gap: 20px;
}

.logo {
    font-size: 24px;
    font-weight: bold;
    color: var(--primary-color);
    display: flex;
    align-items: center;
}

.brand-logo {
    height: 32px;
    width: auto;
    margin-right: 12px;
    border-radius: 4px;
}

.controls { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }

.btn {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text-primary);
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: 14px;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
}

.btn:hover { background: var(--border); }
.btn-primary { background: var(--primary-color); color: white; border-color: var(--primary-color); }
.btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-icon { padding: 8px; min-width: 40px; justify-content: center; }

.card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 20px;
}

.card-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.card-content { padding: 20px; }

/* Subscription Info Block - Cards (default) */
.user-info-cards { display: grid; gap: 16px; }
.user-info-cards .info-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
}
.user-info-cards .info-card-label { color: var(--text-secondary); font-size: 12px; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.user-info-cards .info-card-value { font-weight: 600; font-size: 16px; }

/* Subscription Info Block - Expanded */
.user-info-expanded { display: grid; gap: 16px; }
.user-info-expanded .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
}
.user-info-expanded .info-row:last-child { border-bottom: none; }
.user-info-expanded .info-label { color: var(--text-secondary); font-weight: 500; display: flex; align-items: center; gap: 8px; }
.user-info-expanded .info-value { font-weight: 600; text-align: right; word-break: break-word; }

/* Subscription Info Block - Collapsed */
.user-info-collapsed {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s ease;
}
.user-info-collapsed:hover { background: var(--border); }
.user-info-collapsed .status-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.user-info-collapsed .status-icon.active { background: var(--success); color: white; }
.user-info-collapsed .status-icon.inactive { background: var(--error); color: white; }
.user-info-collapsed .user-summary { flex: 1; }
.user-info-collapsed .user-summary-name { font-weight: 600; font-size: 18px; }
.user-info-collapsed .user-summary-expire { color: var(--text-secondary); font-size: 14px; }
.user-info-collapsed .expand-icon { color: var(--text-muted); transition: transform 0.2s ease; }
.user-info-collapsed.expanded .expand-icon { transform: rotate(180deg); }
.user-info-collapsed-details { display: none; padding: 0 16px 16px; }
.user-info-collapsed-details.open { display: block; }

/* Stats Grid for expanded details */
.stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.stat-card {
    background: linear-gradient(135deg, var(--surface) 0%, rgba(59, 130, 246, 0.05) 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
}
.stat-card-label { color: var(--text-secondary); font-size: 12px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.stat-card-value { font-weight: 600; }

.badge { padding: 4px 8px; border-radius: 9999px; font-size: 12px; font-weight: 500; text-transform: uppercase; }
.badge-active { background: #dcfce7; color: #166534; }
.badge-disabled, .badge-limited, .badge-expired { background: #fee2e2; color: #991b1b; }
.dark-theme .badge-active { background: #14532d; color: #bbf7d0; }
.dark-theme .badge-disabled, .dark-theme .badge-limited, .dark-theme .badge-expired { background: #7f1d1d; color: #fecaca; }

/* Links Section */
.links-section { margin-bottom: 30px; }
.link-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    background: var(--surface);
}
.link-info { flex: 1; min-width: 0; }
.link-name {
    font-weight: 500;
    margin-bottom: 4px;
    word-break: break-word;
    font-family: "Twemoji Country Flags", system-ui, -apple-system, Roboto, "Segoe UI", "Helvetica Neue", "Noto Sans", "Liberation Sans", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
}
.link-actions { display: flex; gap: 8px; }

/* Installation Section */
.apps-section { margin-bottom: 30px; }
.platform-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    background: var(--surface);
    padding: 4px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    flex-wrap: nowrap;
    overflow-x: auto;
}
.platform-tab {
    flex: 1 0 auto;
    padding: 8px 16px;
    text-align: center;
    border-radius: calc(var(--radius) - 2px);
    cursor: pointer;
    transition: all 0.2s ease;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-width: 80px;
}
.platform-tab.active { background: var(--primary-color); color: white; }
#platform-selector-btn { display: none; }

/* App Tabs (horizontal app selection) */
.app-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}
.app-tab {
    padding: 10px 20px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    transition: all 0.2s ease;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
}
.app-tab:hover { border-color: var(--primary-color); }
.app-tab.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }
.app-tab.featured { border-color: var(--warning); }
.app-tab.featured::before { content: ''; display: inline-block; }
.app-tab .star-icon { color: var(--warning); }

/* Installation Guides - Cards */
.guides-cards .guide-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
}
.guides-cards .guide-card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
}
.guides-cards .guide-card-icon {
    width: 40px;
    height: 40px;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.guides-cards .guide-card-title { font-weight: 600; font-size: 16px; }
.guides-cards .guide-card-description { color: var(--text-secondary); margin-bottom: 16px; }
.guides-cards .guide-card-buttons { display: flex; flex-wrap: wrap; gap: 8px; }

/* Installation Guides - Accordion */
.guides-accordion .accordion-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    overflow: hidden;
}
.guides-accordion .accordion-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px;
    cursor: pointer;
    transition: background 0.2s ease;
}
.guides-accordion .accordion-header:hover { background: var(--border); }
.guides-accordion .accordion-icon {
    width: 36px;
    height: 36px;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.guides-accordion .accordion-title { flex: 1; font-weight: 500; }
.guides-accordion .accordion-arrow { color: var(--text-muted); transition: transform 0.2s ease; }
.guides-accordion .accordion-item.open .accordion-arrow { transform: rotate(180deg); }
.guides-accordion .accordion-content {
    display: none;
    padding: 0 16px 16px;
    border-top: 1px solid var(--border);
}
.guides-accordion .accordion-item.open .accordion-content { display: block; padding-top: 16px; }
.guides-accordion .accordion-description { color: var(--text-secondary); margin-bottom: 12px; }
.guides-accordion .accordion-buttons { display: flex; flex-wrap: wrap; gap: 8px; }

/* Installation Guides - Minimal */
.guides-minimal .minimal-step {
    margin-bottom: 24px;
}
.guides-minimal .minimal-step-title {
    font-weight: 600;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.guides-minimal .step-number {
    background: var(--primary-color);
    color: white;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: bold;
    flex-shrink: 0;
}
.guides-minimal .minimal-step-description { color: var(--text-secondary); margin-bottom: 12px; }
.guides-minimal .minimal-step-buttons { display: flex; flex-wrap: wrap; gap: 8px; }

/* Installation Guides - Timeline */
.guides-timeline { position: relative; }
.guides-timeline .timeline-container {
    position: relative;
    padding-left: 48px;
}
.guides-timeline .timeline-line {
    position: absolute;
    left: 18px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--border);
}
.guides-timeline .timeline-step {
    position: relative;
    margin-bottom: 24px;
    display: none;
}
.guides-timeline .timeline-step.active { display: block; }
.guides-timeline .timeline-step-icon {
    position: absolute;
    left: -48px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
}
.guides-timeline .timeline-step-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
}
.guides-timeline .timeline-step-title { font-weight: 600; margin-bottom: 8px; }
.guides-timeline .timeline-step-description { color: var(--text-secondary); margin-bottom: 16px; }
.guides-timeline .timeline-step-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
.guides-timeline .timeline-nav {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    margin-top: 20px;
    padding-left: 48px;
}
.guides-timeline .timeline-nav .btn { flex: 1; justify-content: center; }
.guides-timeline .timeline-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 16px;
    padding-left: 48px;
}
.guides-timeline .timeline-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--border);
    cursor: pointer;
    transition: all 0.2s ease;
}
.guides-timeline .timeline-dot.active { background: var(--primary-color); transform: scale(1.2); }
.guides-timeline .timeline-dot.completed { background: var(--success); }

/* Apps Container */
.apps-container { display: flex; flex-direction: column; gap: 20px; }
.featured-apps-row { display: grid; grid-template-columns: 1fr; gap: 16px; }

.other-apps-spoiler { width: 100%; }
.spoiler-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: all 0.2s ease;
    font-weight: 500;
    width: 100%;
}
.spoiler-header:hover { background: var(--border); }
.spoiler-content { display: none; margin-top: 8px; }
.spoiler-content.open { display: block; }
.spoiler-content .apps-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
.spoiler-arrow { transition: transform 0.2s ease; flex-shrink: 0; }
.spoiler-arrow.open { transform: rotate(180deg); }
.apps-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }

.app-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    position: relative;
    transition: all 0.2s ease;
    cursor: pointer;
    width: 100%;
}
.app-card:hover { border-color: var(--primary-color); box-shadow: var(--shadow-lg); }
.app-card.featured {
    border-color: var(--primary-color);
    background: linear-gradient(135deg, var(--surface) 0%, rgba(59, 130, 246, 0.05) 100%);
}
.app-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.app-icon {
    width: 40px;
    height: 40px;
    border-radius: var(--radius);
    background: var(--primary-color);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    flex-shrink: 0;
}
.app-name { font-weight: 600; font-size: 16px; }
.featured-badge {
    position: absolute;
    top: -1px;
    right: -1px;
    background: var(--primary-color);
    color: white;
    padding: 4px 8px;
    border-radius: 0 var(--radius) 0 var(--radius);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.modal.active { display: flex; }
.modal-content {
    background: var(--surface);
    border-radius: var(--radius);
    max-width: 600px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
}
.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
    border-bottom: 1px solid var(--border);
}
.modal-title {
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: "Twemoji Country Flags", system-ui, -apple-system, Roboto, "Segoe UI", "Helvetica Neue", "Noto Sans", "Liberation Sans", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
}
.modal-close {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: var(--text-secondary);
    padding: 0;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
}
.modal-close:hover { background: var(--border); }
.modal-body { padding: 20px; }

/* Step (for modal) */
.step { margin-bottom: 24px; }
.step-title { font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.step-number {
    background: var(--primary-color);
    color: white;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: bold;
    flex-shrink: 0;
}
.step-description { color: var(--text-secondary); margin-bottom: 12px; }
.step-buttons { display: flex; flex-wrap: wrap; gap: 8px; }

/* Platform Modal */
.platform-modal-list { display: flex; flex-direction: column; gap: 8px; }
.platform-modal-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s ease;
}
.platform-modal-item:hover { background: var(--border); border-color: var(--primary-color); }

/* Settings Modal */
.settings-section { margin-bottom: 24px; }
.settings-section:last-child { margin-bottom: 0; }
.settings-label { font-weight: 600; margin-bottom: 12px; display: block; }
.settings-buttons { display: flex; flex-wrap: wrap; gap: 8px; }

/* QR Modal */
.qr-container { display: flex; justify-content: center; padding: 20px; }
.qr-container img { max-width: 100%; height: auto; border-radius: var(--radius); }

/* Toast */
.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--text-primary);
    color: var(--background);
    padding: 12px 24px;
    border-radius: var(--radius);
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 2000;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* SVG Icon sizing */
.icon-svg { width: 20px; height: 20px; }
.icon-svg-lg { width: 24px; height: 24px; }
.w-4 { width: 16px; }
.h-4 { height: 16px; }
.w-6 { width: 24px; }
.h-6 { height: 24px; }

/* Responsive */
@media (max-width: 768px) {
    .header { flex-direction: column; align-items: flex-start; }
    .controls { width: 100%; justify-content: flex-end; }
    .platform-tabs { display: none; }
    #platform-selector-btn { display: inline-flex !important; }
    .stats-grid { grid-template-columns: 1fr; }
}

@media (min-width: 768px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .featured-apps-row { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
    .spoiler-content .apps-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
    .apps-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
}
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo" id="brandLogo">Subscription</div>
            <div class="controls">
                <button class="btn btn-icon" id="copyLinkBtn" onclick="copySubscriptionUrl()" title="Copy subscription link">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
                    </svg>
                </button>
                <button class="btn btn-icon" id="qrBtn" onclick="showSubscriptionModal()" title="Show QR Code">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/>
                    </svg>
                </button>
                <button class="btn btn-icon" onclick="openModal('settingsModal')">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </button>
            </div>
        </header>
        <main id="mainContent">
            <div class="card"><div class="card-content" style="text-align: center; padding: 40px;">Loading...</div></div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="settingsTitle">Settings</div>
                <button class="modal-close" onclick="closeModal('settingsModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="settings-section">
                    <label class="settings-label" id="themeLabel">Theme</label>
                    <div class="settings-buttons">
                        <button class="btn" onclick="setTheme('light')" id="themeLightBtn">Light</button>
                        <button class="btn" onclick="setTheme('dark')" id="themeDarkBtn">Dark</button>
                        <button class="btn" onclick="setTheme('auto')" id="themeAutoBtn">Auto</button>
                    </div>
                </div>
                <div class="settings-section">
                    <label class="settings-label" id="languageLabel">Language</label>
                    <div class="settings-buttons" id="languageButtons"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- App Setup Modal -->
    <div class="modal" id="appModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="appModalTitle"></div>
                <button class="modal-close" onclick="closeModal('appModal')">&times;</button>
            </div>
            <div class="modal-body" id="appModalBody"></div>
        </div>
    </div>

    <!-- QR Modal -->
    <div class="modal" id="qrModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="qrModalTitle">QR Code</div>
                <button class="modal-close" onclick="closeModal('qrModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="qr-container" id="qrCode"></div>
            </div>
        </div>
    </div>

    <!-- Subscription QR Modal -->
    <div class="modal" id="subscriptionModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="subscriptionModalTitle">Subscription</div>
                <button class="modal-close" onclick="closeModal('subscriptionModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="qr-container" id="subscriptionQrCode"></div>
                <div style="text-align: center; margin-top: 16px;">
                    <button class="btn btn-primary" onclick="copySubscriptionUrl()" id="copySubBtn">Copy Link</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Platform Modal -->
    <div class="modal" id="platformModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="platformModalTitle">Select Platform</div>
                <button class="modal-close" onclick="closeModal('platformModal')">&times;</button>
            </div>
            <div class="modal-body" id="platformModalBody"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Global state
        let panelData = null;
        let appConfig = null;
        let currentLanguage = 'en';
        let currentPlatform = 'ios';
        let currentApp = null;
        let toastTimeout = null;
        let validPlatforms = [];
        let timelineCurrentStep = 0;

        // Language full names for display
        const langFullNames = {
            en: 'English', ru: 'Русский', zh: '中文', fa: 'فارسی', fr: 'Français',
            de: 'Deutsch', es: 'Español', it: 'Italiano', pt: 'Português', ja: '日本語',
            ko: '한국어', ar: 'العربية', tr: 'Türkçe', pl: 'Polski', uk: 'Українська',
            nl: 'Nederlands', vi: 'Tiếng Việt', th: 'ไทย', id: 'Indonesia', ms: 'Melayu'
        };

        // Initialize app
        document.addEventListener('DOMContentLoaded', initializeApp);

        function initializeApp() {
            loadSettings();
            loadAppConfig();
            loadPanelData();
        }

        function loadSettings() {
            const savedTheme = localStorage.getItem('theme') || 'auto';
            applyTheme(savedTheme);
            const savedLang = localStorage.getItem('lang') || getBrowserLanguage();
            currentLanguage = savedLang;
        }

        function getBrowserLanguage() {
            const lang = (navigator.language || navigator.userLanguage).slice(0, 2);
            return appConfig?.locales?.includes(lang) ? lang : (appConfig?.locales?.[0] || 'en');
        }

        function loadAppConfig() {
            fetch('assets/.app-config-v2.json')
                .then(response => {
                    if (!response.ok) throw new Error(`Failed to load config: ${response.status}`);
                    return response.json();
                })
                .then(data => {
                    appConfig = data;

                    // Set meta tags from baseSettings
                    if (appConfig.baseSettings) {
                        if (appConfig.baseSettings.metaTitle) {
                            document.getElementById('pageTitle').textContent = appConfig.baseSettings.metaTitle;
                        }
                        if (appConfig.baseSettings.metaDescription) {
                            document.getElementById('metaDesc').setAttribute('content', appConfig.baseSettings.metaDescription);
                        }
                    }

                    // Set valid platforms
                    validPlatforms = Object.keys(appConfig.platforms || {}).filter(p => {
                        const platform = appConfig.platforms[p];
                        return platform && platform.apps && platform.apps.length > 0;
                    });

                    // Setup language buttons
                    setupLanguageButtons();

                    // Update branding
                    updateBranding();

                    // Set language if not already set
                    if (!localStorage.getItem('lang')) {
                        currentLanguage = getBrowserLanguage();
                    }

                    // Update all texts
                    updateTexts();
                })
                .catch(error => {
                    console.error('Error loading app config:', error);
                })
                .finally(() => {
                    if (panelData) renderContent();
                });
        }

        function loadPanelData() {
            const panelDataB64 = '<%= panelData %>';
            try {
                panelData = JSON.parse(atob(panelDataB64));
            } catch (error) {
                console.error('Error loading panel data:', error);
                panelData = { response: { isFound: false } };
            }
            if (appConfig !== null) renderContent();
        }

        // Translation function
        function t(key) {
            // First check baseTranslations from config
            const translation = appConfig?.baseTranslations?.[key];
            if (translation) {
                return translation[currentLanguage] || translation['en'] || key;
            }
            return key;
        }

        // Get localized text from object
        function getLocalizedText(textObj) {
            if (!textObj) return '';
            if (typeof textObj === 'string') return textObj;
            return textObj[currentLanguage] || textObj['en'] || Object.values(textObj)[0] || '';
        }

        // Get SVG icon from library
        function getSvgIcon(iconKey, className = 'icon-svg') {
            if (!iconKey || !appConfig?.svgLibrary) return '';
            const svg = appConfig.svgLibrary[iconKey];
            if (!svg) return '';
            // Add class to the SVG
            return svg.replace('<svg', `<svg class="${className}"`);
        }

        // Get icon color CSS
        function getIconColor(colorValue) {
            if (!colorValue) return 'var(--primary-color)';
            if (colorValue.startsWith('#')) return colorValue;
            return `var(--color-${colorValue}, var(--primary-color))`;
        }

        function updateBranding() {
            if (!appConfig?.brandingSettings) return;
            const branding = appConfig.brandingSettings;

            const logo = document.getElementById('brandLogo');
            if (logo) {
                logo.innerHTML = '';
                if (branding.logoUrl) {
                    const logoImg = document.createElement('img');
                    logoImg.src = branding.logoUrl;
                    logoImg.alt = branding.title || 'Logo';
                    logoImg.className = 'brand-logo';
                    logo.appendChild(logoImg);
                }
                const titleSpan = document.createElement('span');
                titleSpan.textContent = branding.title || 'Subscription';
                logo.appendChild(titleSpan);
            }

            // Add support button if supportUrl exists
            if (branding.supportUrl) {
                const controls = document.querySelector('.controls');
                if (controls && !controls.querySelector('.support-btn')) {
                    const supportBtn = document.createElement('button');
                    supportBtn.className = 'btn btn-icon support-btn';
                    supportBtn.onclick = () => openLink(branding.supportUrl);

                    const isTelegramUrl = branding.supportUrl.startsWith('https://t.me');
                    supportBtn.innerHTML = isTelegramUrl
                        ? `<svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>`
                        : `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`;

                    const settingsBtn = controls.querySelector('button:last-child');
                    controls.insertBefore(supportBtn, settingsBtn);
                }
            }
        }

        function setupLanguageButtons() {
            const container = document.getElementById('languageButtons');
            if (!container) return;
            container.innerHTML = '';

            const locales = appConfig?.locales || ['en'];
            locales.forEach(langCode => {
                const button = document.createElement('button');
                button.className = 'btn' + (langCode === currentLanguage ? ' btn-primary' : '');
                button.textContent = langFullNames[langCode] || langCode.toUpperCase();
                button.onclick = () => setLanguage(langCode);
                container.appendChild(button);
            });
        }

        function setLanguage(lang) {
            currentLanguage = lang;
            localStorage.setItem('lang', lang);
            updateTexts();
            setupLanguageButtons();
            if (panelData?.response?.isFound) renderContent();
        }

        function updateTexts() {
            // Update static UI elements with translations
            const settingsTitle = document.getElementById('settingsTitle');
            if (settingsTitle && appConfig?.baseTranslations) {
                // Use a generic settings text or keep as is
            }
        }

        function setTheme(theme) {
            localStorage.setItem('theme', theme);
            applyTheme(theme);
        }

        function applyTheme(theme) {
            const html = document.documentElement;
            const themeColorMeta = document.getElementById('themeColor');
            let isDark;
            if (theme === 'auto') {
                isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            } else {
                isDark = theme === 'dark';
            }
            html.classList.toggle('dark-theme', isDark);
            themeColorMeta.setAttribute('content', isDark ? '#0f172a' : '#3b82f6');
        }

        function detectOS() {
            const ua = navigator.userAgent;
            const platform = navigator.platform;
            if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) return 'ios';
            if (/Android/.test(ua)) return 'android';
            if (/Mac/.test(platform)) return 'macos';
            if (/Win/.test(platform)) return 'windows';
            if (/Linux/.test(platform)) return 'linux';
            return 'ios';
        }

        function renderContent() {
            const mainContent = document.getElementById('mainContent');
            if (!panelData?.response?.isFound) {
                mainContent.innerHTML = `<div class="card"><div class="card-content" style="text-align: center; padding: 40px;">${t('unknown')}</div></div>`;
                return;
            }

            let html = '';

            // Render subscription info block based on uiConfig
            const infoBlockType = appConfig?.uiConfig?.subscriptionInfoBlockType || 'expanded';
            if (infoBlockType !== 'hidden') {
                html += renderSubscriptionInfo(infoBlockType);
            }

            // Render installation section
            html += renderInstallationSection();

            // Render connection keys section if enabled
            if (appConfig?.baseSettings?.showConnectionKeys !== false) {
                html += renderLinksSection();
            }

            mainContent.innerHTML = html;
            attachEventListeners();
        }

        function renderSubscriptionInfo(blockType) {
            const { user } = panelData.response;
            const expiresDate = new Date(user.expiresAt);
            const isNeverExpires = expiresDate.getFullYear() >= 2099;
            const isActive = user.userStatus.toLowerCase() === 'active';

            // Format traffic
            const trafficUsed = user.trafficUsed || '0 B';
            const trafficLimit = user.trafficLimit === "0" ? '∞' : user.trafficLimit;
            const bandwidth = `${trafficUsed} / ${trafficLimit}`;

            // Get expiry text
            let expiryText = t('indefinitely');
            if (!isNeverExpires) {
                expiryText = formatDate(expiresDate);
            }

            switch (blockType) {
                case 'collapsed':
                    return renderCollapsedInfo(user, isActive, expiryText, bandwidth, isNeverExpires);
                case 'expanded':
                    return renderExpandedInfo(user, isActive, expiryText, bandwidth, isNeverExpires);
                case 'cards':
                default:
                    return renderCardsInfo(user, isActive, expiryText, bandwidth, isNeverExpires);
            }
        }

        function renderCollapsedInfo(user, isActive, expiryText, bandwidth, isNeverExpires) {
            return `
                <div class="card" style="margin-bottom: 20px;">
                    <div class="user-info-collapsed" onclick="toggleCollapsedInfo(this)">
                        <div class="status-icon ${isActive ? 'active' : 'inactive'}">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                            </svg>
                        </div>
                        <div class="user-summary">
                            <div class="user-summary-name">${escapeHtml(user.username)}</div>
                            <div class="user-summary-expire">${expiryText}</div>
                        </div>
                        <div class="expand-icon">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                            </svg>
                        </div>
                    </div>
                    <div class="user-info-collapsed-details">
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-card-label">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                                    ${t('name')}
                                </div>
                                <div class="stat-card-value">${escapeHtml(user.username)}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-card-label">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                    ${t('status')}
                                </div>
                                <div class="stat-card-value"><span class="badge badge-${user.userStatus.toLowerCase()}">${isActive ? t('active') : t('inactive')}</span></div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-card-label">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                                    ${t('expires')}
                                </div>
                                <div class="stat-card-value">${expiryText}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-card-label">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/></svg>
                                    ${t('bandwidth')}
                                </div>
                                <div class="stat-card-value">${bandwidth}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderExpandedInfo(user, isActive, expiryText, bandwidth, isNeverExpires) {
            return `
                <div class="card" style="margin-bottom: 20px;">
                    <div class="card-content">
                        <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 20px;">
                            <div class="status-icon ${isActive ? 'active' : 'inactive'}" style="width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: ${isActive ? 'var(--success)' : 'var(--error)'}; color: white;">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                                </svg>
                            </div>
                            <div>
                                <div style="font-weight: 600; font-size: 20px;">${escapeHtml(user.username)}</div>
                                <div style="color: var(--text-secondary);">${expiryText}</div>
                            </div>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-card-label">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                                    ${t('name')}
                                </div>
                                <div class="stat-card-value">${escapeHtml(user.username)}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-card-label">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                    ${t('status')}
                                </div>
                                <div class="stat-card-value"><span class="badge badge-${user.userStatus.toLowerCase()}">${isActive ? t('active') : t('inactive')}</span></div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-card-label">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                                    ${t('expires')}
                                </div>
                                <div class="stat-card-value">${expiryText}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-card-label">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/></svg>
                                    ${t('bandwidth')}
                                </div>
                                <div class="stat-card-value">${bandwidth}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCardsInfo(user, isActive, expiryText, bandwidth, isNeverExpires) {
            return `
                <div class="card" style="margin-bottom: 20px;">
                    <div class="card-content">
                        <div class="user-info-cards">
                            <div class="stats-grid">
                                <div class="stat-card">
                                    <div class="stat-card-label">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                                        ${t('name')}
                                    </div>
                                    <div class="stat-card-value">${escapeHtml(user.username)}</div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-card-label">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                        ${t('status')}
                                    </div>
                                    <div class="stat-card-value"><span class="badge badge-${user.userStatus.toLowerCase()}">${isActive ? t('active') : t('inactive')}</span></div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-card-label">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                                        ${t('expires')}
                                    </div>
                                    <div class="stat-card-value">${expiryText}</div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-card-label">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/></svg>
                                        ${t('bandwidth')}
                                    </div>
                                    <div class="stat-card-value">${bandwidth}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function toggleCollapsedInfo(element) {
            element.classList.toggle('expanded');
            const details = element.nextElementSibling;
            details.classList.toggle('open');
        }

        function renderInstallationSection() {
            if (!appConfig?.platforms || validPlatforms.length === 0) return '';

            const storedPlatform = localStorage.getItem('platform');
            currentPlatform = validPlatforms.includes(storedPlatform) ? storedPlatform : detectOS();
            if (!validPlatforms.includes(currentPlatform)) {
                currentPlatform = validPlatforms[0];
            }

            const platformData = appConfig.platforms[currentPlatform];
            const platformDisplayName = getLocalizedText(platformData?.displayName) || currentPlatform;
            const platformIcon = getSvgIcon(platformData?.svgIconKey) || '';

            return `
                <div class="card apps-section">
                    <div class="card-header">
                        <span>${t('installationGuideHeader')}</span>
                        <button class="btn" id="platform-selector-btn" onclick="openPlatformModal()">
                            ${platformIcon} <span>${platformDisplayName}</span>
                        </button>
                    </div>
                    <div class="card-content">
                        <div class="platform-tabs">
                            ${validPlatforms.map(p => {
                                const pData = appConfig.platforms[p];
                                const pName = getLocalizedText(pData?.displayName) || p;
                                const pIcon = getSvgIcon(pData?.svgIconKey) || '';
                                return `<div class="platform-tab ${p === currentPlatform ? 'active' : ''}" data-platform="${p}">${pIcon} ${pName}</div>`;
                            }).join('')}
                        </div>
                        <div id="appsContainer">${renderAppsForPlatform()}</div>
                    </div>
                </div>
            `;
        }

        function renderAppsForPlatform() {
            const platformData = appConfig.platforms[currentPlatform];
            if (!platformData?.apps?.length) return '<div style="text-align: center; padding: 20px; color: var(--text-secondary);">No apps available</div>';

            const apps = platformData.apps;
            const guidesType = appConfig?.uiConfig?.installationGuidesBlockType || 'minimal';

            // Render app tabs
            let html = '<div class="app-tabs">';
            apps.forEach((app, index) => {
                const appIcon = getSvgIcon(app.svgIconKey) || '';
                const starIcon = app.featured ? '<svg class="w-4 h-4 star-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>' : '';
                html += `<div class="app-tab ${index === 0 ? 'active' : ''} ${app.featured ? 'featured' : ''}" data-app-index="${index}">
                    ${starIcon} ${appIcon} ${escapeHtml(app.name)}
                </div>`;
            });
            html += '</div>';

            // Set current app
            currentApp = apps[0];

            // Render guides based on type
            html += `<div id="guidesContainer">${renderGuides(apps[0], guidesType)}</div>`;

            return html;
        }

        function renderGuides(app, guidesType) {
            if (!app?.blocks?.length) return '';

            switch (guidesType) {
                case 'cards':
                    return renderGuidesCards(app);
                case 'accordion':
                    return renderGuidesAccordion(app);
                case 'timeline':
                    return renderGuidesTimeline(app);
                case 'minimal':
                default:
                    return renderGuidesMinimal(app);
            }
        }

        function renderGuidesCards(app) {
            let html = '<div class="guides-cards">';
            app.blocks.forEach((block, index) => {
                const iconColor = getIconColor(block.svgIconColor);
                const icon = getSvgIcon(block.svgIconKey);
                html += `
                    <div class="guide-card">
                        <div class="guide-card-header">
                            <div class="guide-card-icon" style="background: ${iconColor}; color: white;">
                                ${icon}
                            </div>
                            <div class="guide-card-title">${getLocalizedText(block.title)}</div>
                        </div>
                        <div class="guide-card-description">${getLocalizedText(block.description)}</div>
                        <div class="guide-card-buttons">
                            ${renderBlockButtons(block, app)}
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }

        function renderGuidesAccordion(app) {
            let html = '<div class="guides-accordion">';
            app.blocks.forEach((block, index) => {
                const iconColor = getIconColor(block.svgIconColor);
                const icon = getSvgIcon(block.svgIconKey);
                html += `
                    <div class="accordion-item ${index === 0 ? 'open' : ''}">
                        <div class="accordion-header" onclick="toggleAccordion(this)">
                            <div class="accordion-icon" style="background: ${iconColor}; color: white;">
                                ${icon}
                            </div>
                            <div class="accordion-title">${getLocalizedText(block.title)}</div>
                            <div class="accordion-arrow">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                                </svg>
                            </div>
                        </div>
                        <div class="accordion-content">
                            <div class="accordion-description">${getLocalizedText(block.description)}</div>
                            <div class="accordion-buttons">
                                ${renderBlockButtons(block, app)}
                            </div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }

        function renderGuidesMinimal(app) {
            let html = '<div class="guides-minimal">';
            app.blocks.forEach((block, index) => {
                html += `
                    <div class="minimal-step">
                        <div class="minimal-step-title">
                            <span class="step-number">${index + 1}</span>
                            ${getLocalizedText(block.title)}
                        </div>
                        <div class="minimal-step-description">${getLocalizedText(block.description)}</div>
                        <div class="minimal-step-buttons">
                            ${renderBlockButtons(block, app)}
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }

        function renderGuidesTimeline(app) {
            timelineCurrentStep = 0;
            const blocks = app.blocks;

            let html = '<div class="guides-timeline">';

            // Timeline dots
            html += '<div class="timeline-dots">';
            blocks.forEach((_, index) => {
                html += `<div class="timeline-dot ${index === 0 ? 'active' : ''}" data-step="${index}" onclick="goToTimelineStep(${index})"></div>`;
            });
            html += '</div>';

            html += '<div class="timeline-container">';
            html += '<div class="timeline-line"></div>';

            blocks.forEach((block, index) => {
                const iconColor = getIconColor(block.svgIconColor);
                const icon = getSvgIcon(block.svgIconKey);
                html += `
                    <div class="timeline-step ${index === 0 ? 'active' : ''}" data-step="${index}">
                        <div class="timeline-step-icon" style="background: ${iconColor}; color: white;">
                            ${icon}
                        </div>
                        <div class="timeline-step-content">
                            <div class="timeline-step-title">${getLocalizedText(block.title)}</div>
                            <div class="timeline-step-description">${getLocalizedText(block.description)}</div>
                            <div class="timeline-step-buttons">
                                ${renderBlockButtons(block, app)}
                            </div>
                        </div>
                    </div>
                `;
            });

            html += '</div>';

            // Navigation buttons
            html += `
                <div class="timeline-nav">
                    <button class="btn" onclick="prevTimelineStep()" id="timelinePrevBtn" disabled>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                        </svg>
                        Back
                    </button>
                    <button class="btn btn-primary" onclick="nextTimelineStep()" id="timelineNextBtn">
                        Next
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                        </svg>
                    </button>
                </div>
            `;

            html += '</div>';
            return html;
        }

        function renderBlockButtons(block, app) {
            if (!block.buttons?.length) return '';

            const { response } = panelData || {};
            let html = '';

            block.buttons.forEach(button => {
                const buttonText = getLocalizedText(button.text);
                const buttonIcon = getSvgIcon(button.svgIconKey);
                let buttonLink = button.link;

                // Replace placeholder with subscription URL
                if (buttonLink && response?.subscriptionUrl) {
                    buttonLink = buttonLink.replace('{SUBSCRIPTION_URL}', response.subscriptionUrl);
                    buttonLink = buttonLink.replace('{SUBSCRIPTION_URL_B64}', btoa(response.subscriptionUrl));
                }

                const buttonType = button.type || 'link';

                if (buttonType === 'subscription') {
                    // Generate subscription link with app's URL scheme
                    const subscriptionUrl = generateSubscriptionUrl(app, response?.subscriptionUrl);
                    if (subscriptionUrl) {
                        html += `<button class="btn btn-primary" onclick="openSubscriptionUrl('${escapeForAttribute(subscriptionUrl)}')">${buttonIcon} ${buttonText}</button>`;
                    }
                } else if (buttonType === 'copy') {
                    html += `<button class="btn" onclick="copyToClipboard('${escapeForAttribute(buttonLink)}')">${buttonIcon} ${buttonText}</button>`;
                } else {
                    html += `<button class="btn btn-primary" onclick="openLink('${escapeForAttribute(buttonLink)}')">${buttonIcon} ${buttonText}</button>`;
                }
            });

            return html;
        }

        function generateSubscriptionUrl(app, subscriptionUrl) {
            if (!subscriptionUrl) return null;

            // Find the block with subscription button to get URL scheme
            let urlScheme = null;
            for (const block of (app.blocks || [])) {
                for (const button of (block.buttons || [])) {
                    if (button.type === 'subscription' && button.link) {
                        // Extract URL scheme from the link template
                        const match = button.link.match(/^([a-zA-Z][a-zA-Z0-9+.-]*:\/\/)/);
                        if (match) {
                            urlScheme = button.link.replace('{SUBSCRIPTION_URL}', subscriptionUrl).replace('{SUBSCRIPTION_URL_B64}', btoa(subscriptionUrl));
                            return urlScheme;
                        }
                    }
                }
            }

            return null;
        }

        function goToTimelineStep(step) {
            const steps = document.querySelectorAll('.timeline-step');
            const dots = document.querySelectorAll('.timeline-dot');
            const prevBtn = document.getElementById('timelinePrevBtn');
            const nextBtn = document.getElementById('timelineNextBtn');

            if (step < 0 || step >= steps.length) return;

            timelineCurrentStep = step;

            steps.forEach((s, i) => {
                s.classList.toggle('active', i === step);
            });

            dots.forEach((d, i) => {
                d.classList.remove('active', 'completed');
                if (i === step) d.classList.add('active');
                if (i < step) d.classList.add('completed');
            });

            if (prevBtn) prevBtn.disabled = step === 0;
            if (nextBtn) {
                nextBtn.disabled = step === steps.length - 1;
                nextBtn.textContent = step === steps.length - 1 ? 'Done' : 'Next';
                if (step < steps.length - 1) {
                    nextBtn.innerHTML = `Next <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>`;
                }
            }
        }

        function prevTimelineStep() {
            goToTimelineStep(timelineCurrentStep - 1);
        }

        function nextTimelineStep() {
            const steps = document.querySelectorAll('.timeline-step');
            if (timelineCurrentStep < steps.length - 1) {
                goToTimelineStep(timelineCurrentStep + 1);
            }
        }

        function toggleAccordion(header) {
            const item = header.parentElement;
            item.classList.toggle('open');
        }

        function renderLinksSection() {
            const { links } = panelData.response;
            if (!links?.length) return '';

            return `
                <div class="card links-section">
                    <div class="card-header">
                        <span>${t('connectionKeysHeader')}</span>
                        <span class="badge" style="background: var(--primary-color); color: white;">${links.length}</span>
                    </div>
                    <div class="card-content">
                        ${links.map(link => `
                            <div class="link-item">
                                <div class="link-info">
                                    <div class="link-name">
                                        <svg class="w-4 h-4" style="display: inline; vertical-align: middle; margin-right: 8px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                                        </svg>
                                        ${escapeHtml(extractLinkName(link))}
                                    </div>
                                </div>
                                <div class="link-actions">
                                    <button class="btn btn-sm copy-btn" data-copy-text="${escapeHtml(link)}" title="${t('copyLink')}">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                                        </svg>
                                    </button>
                                    <button class="btn btn-sm qr-btn" data-qr-text="${escapeHtml(link)}" data-qr-title="${escapeHtml(extractLinkName(link))}" title="${t('scanQrCode')}">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function attachEventListeners() {
            // Platform tabs
            document.querySelectorAll('.platform-tab').forEach(tab => {
                tab.addEventListener('click', (e) => {
                    const platform = e.currentTarget.dataset.platform;
                    if (platform) switchPlatform(platform);
                });
            });

            // App tabs
            document.querySelectorAll('.app-tab').forEach(tab => {
                tab.addEventListener('click', (e) => {
                    const appIndex = parseInt(e.currentTarget.dataset.appIndex);
                    switchApp(appIndex);
                });
            });

            // Copy buttons
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    copyToClipboard(e.currentTarget.dataset.copyText);
                });
            });

            // QR buttons
            document.querySelectorAll('.qr-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const { qrText, qrTitle } = e.currentTarget.dataset;
                    showQrModal(qrText, qrTitle);
                });
            });

            // Check tabs overflow
            checkTabsOverflow();
            window.addEventListener('resize', checkTabsOverflow);
        }

        function switchPlatform(platform) {
            if (!platform || platform === currentPlatform) return;
            currentPlatform = platform;
            localStorage.setItem('platform', platform);

            document.querySelectorAll('.platform-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.platform === platform);
            });

            const platformData = appConfig.platforms[platform];
            const platformDisplayName = getLocalizedText(platformData?.displayName) || platform;
            const platformIcon = getSvgIcon(platformData?.svgIconKey) || '';

            const button = document.getElementById('platform-selector-btn');
            if (button) {
                button.innerHTML = `${platformIcon} <span>${platformDisplayName}</span>`;
            }

            const appsContainer = document.getElementById('appsContainer');
            if (appsContainer) {
                appsContainer.innerHTML = renderAppsForPlatform();

                // Reattach app tab listeners
                document.querySelectorAll('.app-tab').forEach(tab => {
                    tab.addEventListener('click', (e) => {
                        const appIndex = parseInt(e.currentTarget.dataset.appIndex);
                        switchApp(appIndex);
                    });
                });
            }
        }

        function switchApp(appIndex) {
            const platformData = appConfig.platforms[currentPlatform];
            if (!platformData?.apps?.[appIndex]) return;

            currentApp = platformData.apps[appIndex];

            document.querySelectorAll('.app-tab').forEach((tab, i) => {
                tab.classList.toggle('active', i === appIndex);
            });

            const guidesType = appConfig?.uiConfig?.installationGuidesBlockType || 'minimal';
            const guidesContainer = document.getElementById('guidesContainer');
            if (guidesContainer) {
                guidesContainer.innerHTML = renderGuides(currentApp, guidesType);
            }
        }

        function openPlatformModal() {
            const modalBody = document.getElementById('platformModalBody');
            modalBody.innerHTML = `
                <div class="platform-modal-list">
                    ${validPlatforms.map(p => {
                        const pData = appConfig.platforms[p];
                        const pName = getLocalizedText(pData?.displayName) || p;
                        const pIcon = getSvgIcon(pData?.svgIconKey) || '';
                        return `<div class="platform-modal-item" data-platform="${p}">${pIcon} <span>${pName}</span></div>`;
                    }).join('')}
                </div>
            `;

            modalBody.querySelectorAll('.platform-modal-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    const platform = e.currentTarget.dataset.platform;
                    switchPlatform(platform);
                    closeModal('platformModal');
                });
            });

            openModal('platformModal');
        }

        function checkTabsOverflow() {
            const tabs = document.querySelector('.platform-tabs');
            const button = document.getElementById('platform-selector-btn');
            if (!tabs || !button) return;

            if (window.matchMedia('(max-width: 768px)').matches) {
                return;
            }

            const isOverflowing = tabs.scrollWidth > tabs.parentElement.clientWidth;
            tabs.style.display = isOverflowing ? 'none' : 'flex';
            button.style.display = isOverflowing ? 'inline-flex' : 'none';
        }

        function showQrModal(data, title) {
            if (!data) return;
            document.getElementById('qrModalTitle').textContent = title || t('scanQrCode');
            const qrContainer = document.getElementById('qrCode');
            qrContainer.innerHTML = '';
            try {
                const qr = qrcode(0, 'M');
                qr.addData(data);
                qr.make();
                qrContainer.innerHTML = qr.createImgTag(5, 10);
            } catch (e) {
                console.error('QR generation failed:', e);
                qrContainer.textContent = 'Error generating QR code.';
            }
            openModal('qrModal');
        }

        function showSubscriptionModal() {
            const url = panelData?.response?.subscriptionUrl;
            if (!url) return;

            document.getElementById('subscriptionModalTitle').textContent = t('scanToImport');

            const qrContainer = document.getElementById('subscriptionQrCode');
            qrContainer.innerHTML = '';
            try {
                const qr = qrcode(0, 'M');
                qr.addData(url);
                qr.make();
                qrContainer.innerHTML = qr.createImgTag(5, 10);
            } catch (e) {
                console.error('QR generation failed:', e);
                qrContainer.textContent = 'Error generating QR code.';
            }

            document.getElementById('copySubBtn').textContent = t('copyLink');
            openModal('subscriptionModal');
        }

        function copySubscriptionUrl() {
            copyToClipboard(panelData?.response?.subscriptionUrl);
        }

        function copyToClipboard(text) {
            if (!text) return;
            navigator.clipboard.writeText(text)
                .then(() => showToast(t('linkCopied')))
                .catch(err => console.error('Could not copy text: ', err));
        }

        function showToast(message) {
            if (toastTimeout) clearTimeout(toastTimeout);
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            toastTimeout = setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        function openLink(url) {
            try {
                if (window.Telegram?.WebApp) {
                    window.Telegram.WebApp.openLink(url);
                } else {
                    window.open(url, '_blank');
                }
            } catch (error) {
                console.error('Failed to open URL:', error);
                window.open(url, '_blank');
            }
        }

        function openSubscriptionUrl(url) {
            if (!url || url === '#') return;

            const REDIRECT_BASE = 'https://legiz-ru.github.io/Orion/redirect-page/?redirect_to=';
            const isInTelegram = window.Telegram?.WebApp?.initData;

            let finalUrl = url;
            if (isInTelegram) {
                finalUrl = REDIRECT_BASE + encodeURIComponent(url);
            }

            try {
                if (isInTelegram) {
                    window.Telegram.WebApp.openLink(finalUrl);
                } else {
                    window.open(finalUrl, '_blank');
                }
            } catch (error) {
                console.error('Failed to open subscription URL:', error);
                window.open(finalUrl, '_blank');
            }
        }

        function openModal(id) { document.getElementById(id)?.classList.add('active'); }
        function closeModal(id) { document.getElementById(id)?.classList.remove('active'); }

        function extractLinkName(link) {
            try { return decodeURIComponent(new URL(link).hash.substring(1)); }
            catch {
                const i = link.indexOf('#');
                if (i !== -1) try { return decodeURIComponent(link.substring(i + 1)); } catch {}
            }
            return 'Server Link';
        }

        function formatDate(d) {
            return new Date(d).toLocaleDateString(currentLanguage === 'ru' ? 'ru-RU' : currentLanguage === 'fa' ? 'fa-IR' : 'en-GB');
        }

        function escapeHtml(text) {
            if (typeof text !== 'string') return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeForAttribute(text) {
            if (typeof text !== 'string') return '';
            return text.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        // Event listeners
        document.addEventListener('click', e => { if (e.target.classList.contains('modal')) e.target.classList.remove('active'); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') document.querySelectorAll('.modal.active').forEach(m => m.classList.remove('active')); });
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => { if (localStorage.getItem('theme') === 'auto') applyTheme('auto'); });
    </script>
</body>
</html>
